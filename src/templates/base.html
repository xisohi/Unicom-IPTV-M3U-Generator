<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}IPTV STB Mock{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">📺 IPTV STB Mock</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="/config">配置</a></li>
        <li class="nav-item"><a class="nav-link" href="/channels">频道</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule">定时</a></li>
        <li class="nav-item"><a class="nav-link" href="/logs">日志</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container" style="z-index:9999">
  <div class="toast align-items-center border-0" id="toast-el" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg, type) {
  var el = document.getElementById('toast-el');
  el.className = 'toast align-items-center border-0 bg-' + (type || 'success') + ' text-white';
  document.getElementById('toast-msg').textContent = msg;
  var t = new bootstrap.Toast(el, {delay: 3000});
  t.show();
}
</script>
</body>
</html>
